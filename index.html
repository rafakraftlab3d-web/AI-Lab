<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <title>AI-Lab Mobile</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            background: #101114;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin: 5px 0 10px;
        }

        #status {
            min-height: 24px;
            margin-bottom: 15px;
        }

        .camera-box {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: auto;
            overflow: hidden;
            border: 2px solid #444;
            border-radius: 14px;
            background: black;
        }

        video {
            display: block;
            width: 100%;
            height: auto;
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .botoes {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        button {
            min-width: 130px;
            padding: 13px 18px;
            border: none;
            border-radius: 9px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        #iniciar {
            background: #36c96f;
        }

        #trocar {
            background: #f0b744;
        }

        #flash {
            background: #7c5cff;
            color: white;
        }

        #parar {
            background: #e05a5a;
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <h1>AI-Lab Mobile</h1>

    <p id="status">Pressione “Iniciar câmera”.</p>

    <div class="camera-box">
        <video
            id="video"
            autoplay
            muted
            playsinline
        ></video>

        <canvas id="overlay"></canvas>
    </div>

    <div class="botoes">
        <button id="iniciar">Iniciar câmera</button>
        <button id="trocar" disabled>Trocar câmera</button>
        <button id="flash" disabled>Ativar flash</button>
        <button id="parar" disabled>Parar</button>
    </div>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("overlay");
        const ctx = canvas.getContext("2d");

        const statusTexto = document.getElementById("status");
        const botaoIniciar = document.getElementById("iniciar");
        const botaoTrocar = document.getElementById("trocar");
        const botaoFlash = document.getElementById("flash");
        const botaoParar = document.getElementById("parar");

        let stream = null;
        let videoTrack = null;
        let cameraSelecionada = "environment";
        let flashLigado = false;
        let animacao = null;

        async function iniciarCamera() {
            pararCamera(false);

            statusTexto.textContent = "Solicitando acesso à câmera...";

            const configuracao = {
                audio: false,
                video: {
                    facingMode: {
                        ideal: cameraSelecionada
                    },
                    width: {
                        ideal: 1280
                    },
                    height: {
                        ideal: 720
                    }
                }
            };

            try {
                stream = await navigator.mediaDevices.getUserMedia(
                    configuracao
                );

                videoTrack = stream.getVideoTracks()[0];
                video.srcObject = stream;

                await video.play();

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                botaoIniciar.disabled = true;
                botaoTrocar.disabled = false;
                botaoParar.disabled = false;

                configurarBotaoFlash();

                statusTexto.textContent =
                    `Câmera ativa — ${video.videoWidth} × ${video.videoHeight}`;

                desenharOverlay();
            } catch (erro) {
                console.error(erro);

                statusTexto.textContent =
                    "Erro ao abrir a câmera. Verifique a permissão do navegador.";
            }
        }

        function configurarBotaoFlash() {
            flashLigado = false;
            botaoFlash.textContent = "Ativar flash";

            if (
                !videoTrack ||
                typeof videoTrack.getCapabilities !== "function"
            ) {
                botaoFlash.disabled = true;
                botaoFlash.textContent = "Flash indisponível";
                return;
            }

            const capacidades = videoTrack.getCapabilities();

            if ("torch" in capacidades && capacidades.torch === true) {
                botaoFlash.disabled = false;
            } else {
                botaoFlash.disabled = true;
                botaoFlash.textContent = "Flash indisponível";
            }
        }

        async function alternarFlash() {
            if (!videoTrack) {
                return;
            }

            if (
                typeof videoTrack.getCapabilities !== "function" ||
                typeof videoTrack.applyConstraints !== "function"
            ) {
                statusTexto.textContent =
                    "Este navegador não oferece controle do flash.";
                return;
            }

            const capacidades = videoTrack.getCapabilities();

            if (!("torch" in capacidades) || capacidades.torch !== true) {
                statusTexto.textContent =
                    "Flash indisponível nesta câmera ou navegador.";
                return;
            }

            try {
                const novoEstado = !flashLigado;

                await videoTrack.applyConstraints({
                    advanced: [
                        {
                            torch: novoEstado
                        }
                    ]
                });

                flashLigado = novoEstado;

                botaoFlash.textContent =
                    flashLigado
                        ? "Desativar flash"
                        : "Ativar flash";

                statusTexto.textContent =
                    flashLigado
                        ? "Flash ligado."
                        : "Flash desligado.";
            } catch (erro) {
                console.error(erro);

                flashLigado = false;
                botaoFlash.textContent = "Ativar flash";

                statusTexto.textContent =
                    "Não foi possível controlar o flash neste aparelho.";
            }
        }

        function desenharOverlay() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centroX = canvas.width / 2;
            const centroY = canvas.height / 2;

            ctx.strokeStyle = "red";
            ctx.lineWidth = 3;

            ctx.beginPath();
            ctx.moveTo(centroX, 0);
            ctx.lineTo(centroX, canvas.height);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, centroY);
            ctx.lineTo(canvas.width, centroY);
            ctx.stroke();

            ctx.fillStyle = "lime";
            ctx.font = "bold 28px Arial";
            ctx.fillText("Câmera: OK", 30, 45);

            ctx.fillStyle = "white";
            ctx.font = "24px Arial";
            ctx.fillText(
                `${canvas.width} × ${canvas.height}`,
                30,
                82
            );

            animacao = requestAnimationFrame(desenharOverlay);
        }

        function pararCamera(atualizarStatus = true) {
            if (animacao !== null) {
                cancelAnimationFrame(animacao);
                animacao = null;
            }

            if (stream !== null) {
                stream.getTracks().forEach(track => track.stop());
            }

            stream = null;
            videoTrack = null;
            flashLigado = false;

            video.srcObject = null;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            botaoIniciar.disabled = false;
            botaoTrocar.disabled = true;
            botaoFlash.disabled = true;
            botaoParar.disabled = true;

            botaoFlash.textContent = "Ativar flash";

            if (atualizarStatus) {
                statusTexto.textContent = "Câmera desligada.";
            }
        }

        async function trocarCamera() {
            cameraSelecionada =
                cameraSelecionada === "environment"
                    ? "user"
                    : "environment";

            await iniciarCamera();
        }

        botaoIniciar.addEventListener(
            "click",
            iniciarCamera
        );

        botaoTrocar.addEventListener(
            "click",
            trocarCamera
        );

        botaoFlash.addEventListener(
            "click",
            alternarFlash
        );

        botaoParar.addEventListener(
            "click",
            () => pararCamera(true)
        );
    </script>
</body>
</html>
