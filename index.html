<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <title>AI-Lab Mobile</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding:
                max(16px, env(safe-area-inset-top))
                14px
                max(24px, env(safe-area-inset-bottom));

            background: #101114;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        h1 {
            margin: 4px 0 8px;
            font-size: 26px;
        }

        #status {
            min-height: 42px;
            margin: 0 0 12px;
            color: #d8d8d8;
            font-size: 15px;
            line-height: 1.4;
        }

        .painel {
            width: min(100%, 850px);
            margin: 0 auto;
        }

        .camera-box {
            position: relative;
            width: 100%;
            overflow: hidden;

            border: 2px solid #444;
            border-radius: 16px;
            background: black;
        }

        video {
            display: block;
            width: 100%;
            height: auto;

            /*
             * Mantém a imagem real.
             * Não espelha automaticamente a câmera frontal.
             */
            transform: scaleX(1);
        }

        canvas {
            position: absolute;
            inset: 0;

            width: 100%;
            height: 100%;

            pointer-events: none;
        }

        .informacoes {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-top: 12px;
        }

        .cartao {
            padding: 10px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #191b20;
        }

        .cartao strong {
            display: block;
            margin-bottom: 4px;
            color: #8ae99f;
            font-size: 13px;
        }

        .cartao span {
            font-size: 16px;
        }

        .botoes {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        button {
            min-width: 135px;
            padding: 13px 16px;

            border: none;
            border-radius: 10px;

            color: #101114;
            font-size: 15px;
            font-weight: bold;

            cursor: pointer;
            touch-action: manipulation;
        }

        #iniciar {
            background: #39cc72;
        }

        #trocar {
            background: #f0b744;
        }

        #flash {
            background: #8b73ff;
            color: white;
        }

        #detectar {
            background: #49a5ff;
            color: white;
        }

        #parar {
            background: #eb6262;
            color: white;
        }

        button:disabled {
            opacity: 0.42;
            cursor: not-allowed;
        }

        .legenda {
            margin-top: 14px;
            color: #aaa;
            font-size: 13px;
            line-height: 1.4;
        }

        @media (min-width: 700px) {
            .informacoes {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body>
    <main class="painel">
        <h1>AI-Lab Mobile</h1>

        <p id="status">
            Carregando o detector facial...
        </p>

        <div class="camera-box">
            <video
                id="video"
                autoplay
                muted
                playsinline
            ></video>

            <canvas id="overlay"></canvas>
        </div>

        <section class="informacoes">
            <div class="cartao">
                <strong>CÂMERA</strong>
                <span id="infoCamera">Desligada</span>
            </div>

            <div class="cartao">
                <strong>RESOLUÇÃO</strong>
                <span id="infoResolucao">—</span>
            </div>

            <div class="cartao">
                <strong>ROSTOS</strong>
                <span id="infoRostos">0</span>
            </div>

            <div class="cartao">
                <strong>CONFIANÇA</strong>
                <span id="infoConfianca">—</span>
            </div>
        </section>

        <div class="botoes">
            <button id="iniciar" disabled>
                Iniciar câmera
            </button>

            <button id="trocar" disabled>
                Trocar câmera
            </button>

            <button id="flash" disabled>
                Ativar flash
            </button>

            <button id="detectar" disabled>
                Detecção: ON
            </button>

            <button id="parar" disabled>
                Parar
            </button>
        </div>

        <p class="legenda">
            Retângulo verde: rosto detectado. Pontos amarelos:
            olhos, nariz, boca e laterais da face.
        </p>
    </main>

    <script type="module">
        import {
            FaceDetector,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs";

        const video = document.getElementById("video");
        const canvas = document.getElementById("overlay");
        const ctx = canvas.getContext("2d");

        const statusTexto =
            document.getElementById("status");

        const infoCamera =
            document.getElementById("infoCamera");

        const infoResolucao =
            document.getElementById("infoResolucao");

        const infoRostos =
            document.getElementById("infoRostos");

        const infoConfianca =
            document.getElementById("infoConfianca");

        const botaoIniciar =
            document.getElementById("iniciar");

        const botaoTrocar =
            document.getElementById("trocar");

        const botaoFlash =
            document.getElementById("flash");

        const botaoDetectar =
            document.getElementById("detectar");

        const botaoParar =
            document.getElementById("parar");

        let faceDetector = null;

        let stream = null;
        let videoTrack = null;

        let cameraSelecionada = "environment";

        let flashLigado = false;
        let deteccaoAtiva = true;

        let animacaoId = null;
        let ultimoTempoDoVideo = -1;
        let ultimaDeteccaoMs = 0;

        /*
         * Limita a análise a aproximadamente 15 vezes por segundo.
         * Isso reduz aquecimento e consumo de bateria.
         */
        const INTERVALO_DETECCAO_MS = 66;

        async function carregarDetectorFacial() {
            try {
                statusTexto.textContent =
                    "Carregando arquivos da visão computacional...";

                const vision =
                    await FilesetResolver.forVisionTasks(
                        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
                    );

                statusTexto.textContent =
                    "Carregando modelo de detecção facial...";

                faceDetector =
                    await FaceDetector.createFromOptions(
                        vision,
                        {
                            baseOptions: {
                                modelAssetPath:
                                    "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite",
                                delegate: "GPU"
                            },

                            runningMode: "VIDEO",

                            minDetectionConfidence: 0.5,

                            minSuppressionThreshold: 0.3
                        }
                    );

                statusTexto.textContent =
                    "Detector carregado. Pressione “Iniciar câmera”.";

                botaoIniciar.disabled = false;
            } catch (erro) {
                console.error(
                    "Erro ao carregar o detector:",
                    erro
                );

                statusTexto.textContent =
                    "Erro ao carregar a IA. Atualize a página e tente novamente.";
            }
        }

        async function iniciarCamera() {
            pararCamera(false);

            statusTexto.textContent =
                "Solicitando acesso à câmera...";

            const configuracao = {
                audio: false,

                video: {
                    facingMode: {
                        ideal: cameraSelecionada
                    },

                    width: {
                        ideal: 1280
                    },

                    height: {
                        ideal: 720
                    }
                }
            };

            try {
                stream =
                    await navigator.mediaDevices.getUserMedia(
                        configuracao
                    );

                videoTrack =
                    stream.getVideoTracks()[0];

                video.srcObject = stream;

                await video.play();

                /*
                 * Garante imagem não espelhada nas duas câmeras.
                 */
                video.style.transform = "scaleX(1)";

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                infoCamera.textContent =
                    cameraSelecionada === "environment"
                        ? "Traseira"
                        : "Frontal";

                infoResolucao.textContent =
                    `${video.videoWidth} × ${video.videoHeight}`;

                infoRostos.textContent = "0";
                infoConfianca.textContent = "—";

                botaoIniciar.disabled = true;
                botaoTrocar.disabled = false;
                botaoDetectar.disabled = false;
                botaoParar.disabled = false;

                configurarBotaoFlash();

                statusTexto.textContent =
                    deteccaoAtiva
                        ? "Câmera ativa. Procurando rostos..."
                        : "Câmera ativa. Detecção pausada.";

                ultimoTempoDoVideo = -1;
                ultimaDeteccaoMs = 0;

                executarLoop();
            } catch (erro) {
                console.error(
                    "Erro ao abrir a câmera:",
                    erro
                );

                statusTexto.textContent =
                    "Não foi possível abrir a câmera. Verifique a permissão do navegador.";

                botaoIniciar.disabled = false;
            }
        }

        function configurarBotaoFlash() {
            flashLigado = false;
            botaoFlash.textContent = "Ativar flash";

            if (
                cameraSelecionada !== "environment" ||
                !videoTrack ||
                typeof videoTrack.getCapabilities !== "function"
            ) {
                botaoFlash.disabled = true;
                botaoFlash.textContent =
                    cameraSelecionada === "user"
                        ? "Flash só na traseira"
                        : "Flash indisponível";

                return;
            }

            const capacidades =
                videoTrack.getCapabilities();

            if (
                "torch" in capacidades &&
                capacidades.torch === true
            ) {
                botaoFlash.disabled = false;
            } else {
                botaoFlash.disabled = true;
                botaoFlash.textContent =
                    "Flash indisponível";
            }
        }

        async function alternarFlash() {
            if (!videoTrack) {
                return;
            }

            if (
                typeof videoTrack.getCapabilities !== "function" ||
                typeof videoTrack.applyConstraints !== "function"
            ) {
                statusTexto.textContent =
                    "O navegador não oferece controle do flash.";

                return;
            }

            const capacidades =
                videoTrack.getCapabilities();

            if (
                !("torch" in capacidades) ||
                capacidades.torch !== true
            ) {
                statusTexto.textContent =
                    "Flash indisponível nesta câmera.";

                return;
            }

            try {
                const novoEstado = !flashLigado;

                await videoTrack.applyConstraints({
                    advanced: [
                        {
                            torch: novoEstado
                        }
                    ]
                });

                flashLigado = novoEstado;

                botaoFlash.textContent =
                    flashLigado
                        ? "Desativar flash"
                        : "Ativar flash";

                statusTexto.textContent =
                    flashLigado
                        ? "Flash ligado."
                        : "Flash desligado.";
            } catch (erro) {
                console.error(
                    "Erro ao controlar flash:",
                    erro
                );

                flashLigado = false;

                botaoFlash.textContent =
                    "Ativar flash";

                statusTexto.textContent =
                    "Não foi possível controlar o flash.";
            }
        }

        function executarLoop(tempoAtual = performance.now()) {
            if (!stream || video.readyState < 2) {
                animacaoId =
                    requestAnimationFrame(executarLoop);

                return;
            }

            limparOverlay();

            if (
                deteccaoAtiva &&
                faceDetector &&
                video.currentTime !== ultimoTempoDoVideo &&
                tempoAtual - ultimaDeteccaoMs >=
                    INTERVALO_DETECCAO_MS
            ) {
                try {
                    const resultado =
                        faceDetector.detectForVideo(
                            video,
                            tempoAtual
                        );

                    desenharDeteccoes(
                        resultado.detections || []
                    );

                    ultimoTempoDoVideo =
                        video.currentTime;

                    ultimaDeteccaoMs =
                        tempoAtual;
                } catch (erro) {
                    console.error(
                        "Erro durante a detecção:",
                        erro
                    );
                }
            } else if (!deteccaoAtiva) {
                desenharMensagemOverlay(
                    "Detecção pausada"
                );
            }

            animacaoId =
                requestAnimationFrame(executarLoop);
        }

        function limparOverlay() {
            ctx.clearRect(
                0,
                0,
                canvas.width,
                canvas.height
            );
        }

        function desenharDeteccoes(deteccoes) {
            infoRostos.textContent =
                String(deteccoes.length);

            if (deteccoes.length === 0) {
                infoConfianca.textContent = "—";

                desenharMensagemOverlay(
                    "Nenhum rosto detectado"
                );

                return;
            }

            let maiorConfianca = 0;

            for (const deteccao of deteccoes) {
                const caixa = deteccao.boundingBox;

                const confianca =
                    deteccao.categories?.[0]?.score ?? 0;

                maiorConfianca =
                    Math.max(
                        maiorConfianca,
                        confianca
                    );

                desenharCaixa(
                    caixa,
                    confianca
                );

                desenharPontosFaciais(
                    deteccao.keypoints || []
                );
            }

            infoConfianca.textContent =
                `${(maiorConfianca * 100).toFixed(1)}%`;

            statusTexto.textContent =
                deteccoes.length === 1
                    ? "1 rosto detectado."
                    : `${deteccoes.length} rostos detectados.`;
        }

        function desenharCaixa(caixa, confianca) {
            if (!caixa) {
                return;
            }

            const x = caixa.originX;
            const y = caixa.originY;
            const largura = caixa.width;
            const altura = caixa.height;

            ctx.strokeStyle = "#32ff72";
            ctx.lineWidth = 5;

            ctx.strokeRect(
                x,
                y,
                largura,
                altura
            );

            const texto =
                `Rosto ${(confianca * 100).toFixed(1)}%`;

            ctx.font =
                "bold 24px Arial";

            const larguraTexto =
                ctx.measureText(texto).width;

            const alturaFundo = 36;

            const textoY =
                Math.max(
                    alturaFundo,
                    y
                );

            ctx.fillStyle =
                "rgba(0, 0, 0, 0.72)";

            ctx.fillRect(
                x,
                textoY - alturaFundo,
                larguraTexto + 18,
                alturaFundo
            );

            ctx.fillStyle = "#32ff72";

            ctx.fillText(
                texto,
                x + 8,
                textoY - 9
            );
        }

        function desenharPontosFaciais(pontos) {
            for (const ponto of pontos) {
                /*
                 * Os pontos vêm normalizados entre 0 e 1.
                 */
                const x =
                    ponto.x * canvas.width;

                const y =
                    ponto.y * canvas.height;

                ctx.beginPath();

                ctx.arc(
                    x,
                    y,
                    7,
                    0,
                    Math.PI * 2
                );

                ctx.fillStyle = "#ffe600";
                ctx.fill();

                ctx.strokeStyle = "#111";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function desenharMensagemOverlay(texto) {
            ctx.font = "bold 23px Arial";

            const larguraTexto =
                ctx.measureText(texto).width;

            const x =
                (canvas.width - larguraTexto) / 2;

            const y = 45;

            ctx.fillStyle =
                "rgba(0, 0, 0, 0.65)";

            ctx.fillRect(
                x - 12,
                12,
                larguraTexto + 24,
                45
            );

            ctx.fillStyle = "white";

            ctx.fillText(
                texto,
                x,
                y
            );
        }

        function alternarDeteccao() {
            deteccaoAtiva = !deteccaoAtiva;

            botaoDetectar.textContent =
                deteccaoAtiva
                    ? "Detecção: ON"
                    : "Detecção: OFF";

            if (!deteccaoAtiva) {
                infoRostos.textContent = "0";
                infoConfianca.textContent = "—";

                statusTexto.textContent =
                    "Detecção facial pausada.";
            } else {
                statusTexto.textContent =
                    "Detecção facial ativada.";
            }
        }

        async function trocarCamera() {
            cameraSelecionada =
                cameraSelecionada === "environment"
                    ? "user"
                    : "environment";

            await iniciarCamera();
        }

        function pararCamera(
            atualizarStatus = true
        ) {
            if (animacaoId !== null) {
                cancelAnimationFrame(animacaoId);
                animacaoId = null;
            }

            if (stream !== null) {
                stream
                    .getTracks()
                    .forEach(
                        track => track.stop()
                    );
            }

            stream = null;
            videoTrack = null;
            flashLigado = false;

            video.srcObject = null;

            limparOverlay();

            infoCamera.textContent = "Desligada";
            infoResolucao.textContent = "—";
            infoRostos.textContent = "0";
            infoConfianca.textContent = "—";

            botaoIniciar.disabled =
                faceDetector === null;

            botaoTrocar.disabled = true;
            botaoFlash.disabled = true;
            botaoDetectar.disabled = true;
            botaoParar.disabled = true;

            botaoFlash.textContent =
                "Ativar flash";

            if (atualizarStatus) {
                statusTexto.textContent =
                    "Câmera desligada.";
            }
        }

        botaoIniciar.addEventListener(
            "click",
            iniciarCamera
        );

        botaoTrocar.addEventListener(
            "click",
            trocarCamera
        );

        botaoFlash.addEventListener(
            "click",
            alternarFlash
        );

        botaoDetectar.addEventListener(
            "click",
            alternarDeteccao
        );

        botaoParar.addEventListener(
            "click",
            () => pararCamera(true)
        );

        carregarDetectorFacial();
    </script>
</body>
</html>
