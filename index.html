<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <meta
        http-equiv="Cache-Control"
        content="no-cache, no-store, must-revalidate"
    >

    <title>AI-Lab Mobile V4</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            min-height: 100vh;

            padding:
                max(16px, env(safe-area-inset-top))
                14px
                max(30px, env(safe-area-inset-bottom));

            background: #101114;
            color: white;

            font-family:
                Arial,
                Helvetica,
                sans-serif;
        }

        .app {
            width: min(100%, 900px);
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 12px;
        }

        h1 {
            margin: 4px 0;
            font-size: 26px;
        }

        .versao {
            display: inline-block;

            padding: 5px 10px;

            border-radius: 999px;

            background: #29303b;
            color: #76c8ff;

            font-size: 12px;
            font-weight: bold;
        }

        #status {
            min-height: 44px;

            margin: 12px 0;

            color: #d8d8d8;

            font-size: 15px;
            line-height: 1.4;
            text-align: center;
        }

        .camera-box {
            position: relative;

            width: 100%;

            overflow: hidden;

            border: 2px solid #454950;
            border-radius: 16px;

            background: black;
        }

        video {
            display: block;

            width: 100%;
            height: auto;

            background: black;
        }

        /*
         * Apenas a imagem do vídeo será espelhada.
         * O canvas ficará normal para os textos não inverterem.
         */
        video.espelhado {
            transform: scaleX(-1);
        }

        canvas {
            position: absolute;
            inset: 0;

            display: block;

            width: 100%;
            height: 100%;

            pointer-events: none;
        }

        .informacoes {
            display: grid;

            grid-template-columns:
                repeat(2, minmax(0, 1fr));

            gap: 8px;

            margin-top: 12px;
        }

        .cartao {
            padding: 11px 8px;

            border: 1px solid #32363e;
            border-radius: 11px;

            background: #191c21;

            text-align: center;
        }

        .cartao strong {
            display: block;

            margin-bottom: 5px;

            color: #8ae99f;

            font-size: 12px;
        }

        .cartao span {
            font-size: 16px;
            font-weight: bold;
        }

        .botoes {
            display: flex;

            justify-content: center;

            gap: 10px;
            flex-wrap: wrap;

            margin-top: 16px;
        }

        button {
            min-width: 138px;

            padding: 13px 15px;

            border: none;
            border-radius: 10px;

            font-size: 15px;
            font-weight: bold;

            cursor: pointer;
            touch-action: manipulation;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #iniciar {
            background: #39cc72;
            color: #101114;
        }

        #trocar {
            background: #f0b744;
            color: #101114;
        }

        #flash {
            background: #8b73ff;
            color: white;
        }

        #modo {
            background: #49a5ff;
            color: white;
        }

        #detectar {
            background: #22b8a7;
            color: white;
        }

        #parar {
            background: #eb6262;
            color: white;
        }

        .legenda {
            margin-top: 14px;

            color: #aeb3bc;

            font-size: 13px;
            line-height: 1.5;
            text-align: center;
        }

        .legenda-face {
            color: #35ff72;
            font-weight: bold;
        }

        .legenda-objeto {
            color: #00c8ff;
            font-weight: bold;
        }

        @media (min-width: 700px) {
            .informacoes {
                grid-template-columns:
                    repeat(4, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body>

    <main class="app">

        <header>
            <h1>AI-Lab Mobile</h1>

            <span class="versao">
                VERSÃO 4 — ROSTOS E OBJETOS
            </span>
        </header>

        <p id="status">
            Preparando os modelos de visão computacional...
        </p>

        <div class="camera-box">

            <video
                id="video"
                autoplay
                muted
                playsinline
            ></video>

            <canvas id="overlay"></canvas>

        </div>

        <section class="informacoes">

            <div class="cartao">
                <strong>CÂMERA</strong>
                <span id="infoCamera">Desligada</span>
            </div>

            <div class="cartao">
                <strong>RESOLUÇÃO</strong>
                <span id="infoResolucao">—</span>
            </div>

            <div class="cartao">
                <strong>ROSTOS</strong>
                <span id="infoRostos">0</span>
            </div>

            <div class="cartao">
                <strong>OBJETOS</strong>
                <span id="infoObjetos">0</span>
            </div>

        </section>

        <div class="botoes">

            <button id="iniciar" disabled>
                Iniciar câmera
            </button>

            <button id="trocar" disabled>
                Trocar câmera
            </button>

            <button id="flash" disabled>
                Ativar flash
            </button>

            <button id="modo" disabled>
                Modo: ambos
            </button>

            <button id="detectar" disabled>
                Detecção: ON
            </button>

            <button id="parar" disabled>
                Parar
            </button>

        </div>

        <p class="legenda">
            <span class="legenda-face">Verde:</span>
            rosto detectado.

            <br>

            <span class="legenda-objeto">Azul:</span>
            objeto detectado.
        </p>

    </main>

    <script type="module">

        import {
            FaceDetector,
            ObjectDetector,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs";


        /*
         * ELEMENTOS DA INTERFACE
         */

        const video =
            document.getElementById("video");

        const canvas =
            document.getElementById("overlay");

        const contexto =
            canvas.getContext("2d");


        const statusTexto =
            document.getElementById("status");

        const infoCamera =
            document.getElementById("infoCamera");

        const infoResolucao =
            document.getElementById("infoResolucao");

        const infoRostos =
            document.getElementById("infoRostos");

        const infoObjetos =
            document.getElementById("infoObjetos");


        const botaoIniciar =
            document.getElementById("iniciar");

        const botaoTrocar =
            document.getElementById("trocar");

        const botaoFlash =
            document.getElementById("flash");

        const botaoModo =
            document.getElementById("modo");

        const botaoDetectar =
            document.getElementById("detectar");

        const botaoParar =
            document.getElementById("parar");


        /*
         * ESTADO DO SISTEMA
         */

        let detectorFacial = null;
        let detectorObjetos = null;

        let stream = null;
        let faixaVideo = null;

        let cameraSelecionada =
            "environment";

        let flashLigado = false;
        let deteccaoAtiva = true;

        /*
         * Modos:
         * ambos
         * rosto
         * objetos
         */
        let modoDeteccao = "ambos";

        let animacaoId = null;

        let ultimoTempoVideo = -1;
        let ultimaAnalise = 0;

        let ultimosRostos = [];
        let ultimosObjetos = [];

        /*
         * Rodar os dois modelos em cada frame seria pesado.
         * Aproximadamente 6 a 7 análises por segundo.
         */
        const INTERVALO_ANALISE_MS = 150;


        /*
         * Tradução de algumas categorias comuns.
         * Categorias sem tradução continuam em inglês.
         */

        const traducoes = {
            person: "pessoa",
            bicycle: "bicicleta",
            car: "carro",
            motorcycle: "motocicleta",
            airplane: "avião",
            bus: "ônibus",
            train: "trem",
            truck: "caminhão",
            boat: "barco",

            bottle: "garrafa",
            cup: "copo",
            fork: "garfo",
            knife: "faca",
            spoon: "colher",
            bowl: "tigela",

            chair: "cadeira",
            couch: "sofá",
            bed: "cama",
            dining_table: "mesa",

            cell_phone: "celular",
            laptop: "notebook",
            mouse: "mouse",
            keyboard: "teclado",
            remote: "controle remoto",

            book: "livro",
            clock: "relógio",
            scissors: "tesoura",
            toothbrush: "escova de dentes",

            dog: "cachorro",
            cat: "gato",
            bird: "pássaro",

            backpack: "mochila",
            handbag: "bolsa",
            suitcase: "mala",

            tv: "televisão",
            microwave: "micro-ondas",
            refrigerator: "geladeira"
        };


        /*
         * CARREGAMENTO DOS MODELOS
         */

        async function carregarModelos() {

            try {

                statusTexto.textContent =
                    "Carregando biblioteca do MediaPipe...";

                const arquivosVision =
                    await FilesetResolver.forVisionTasks(
                        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
                    );


                statusTexto.textContent =
                    "Carregando detector facial...";

                detectorFacial =
                    await FaceDetector.createFromOptions(
                        arquivosVision,
                        {
                            baseOptions: {
                                modelAssetPath:
                                    "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite"
                            },

                            runningMode: "VIDEO",

                            minDetectionConfidence: 0.45,

                            minSuppressionThreshold: 0.3
                        }
                    );


                statusTexto.textContent =
                    "Carregando detector de objetos...";

                detectorObjetos =
                    await ObjectDetector.createFromOptions(
                        arquivosVision,
                        {
                            baseOptions: {
                                modelAssetPath:
                                    "https://storage.googleapis.com/mediapipe-tasks/object_detector/efficientdet_lite0_uint8.tflite"
                            },

                            runningMode: "VIDEO",

                            scoreThreshold: 0.35,

                            maxResults: 8
                        }
                    );


                statusTexto.textContent =
                    "Modelos carregados. Pressione “Iniciar câmera”.";

                botaoIniciar.disabled = false;

            } catch (erro) {

                console.error(
                    "Erro ao carregar modelos:",
                    erro
                );

                statusTexto.textContent =
                    "Falha ao carregar os modelos. Atualize a página.";

            }
        }


        /*
         * CÂMERA
         */

        async function iniciarCamera() {

            pararCamera(false);

            statusTexto.textContent =
                "Solicitando acesso à câmera...";

            const configuracao = {
                audio: false,

                video: {
                    facingMode: {
                        ideal: cameraSelecionada
                    },

                    width: {
                        ideal: 1280
                    },

                    height: {
                        ideal: 720
                    }
                }
            };

            try {

                stream =
                    await navigator.mediaDevices.getUserMedia(
                        configuracao
                    );

                faixaVideo =
                    stream.getVideoTracks()[0];

                video.srcObject = stream;

                await video.play();

                canvas.width =
                    video.videoWidth;

                canvas.height =
                    video.videoHeight;

                configurarEspelhamento();

                infoCamera.textContent =
                    cameraSelecionada === "environment"
                        ? "Traseira"
                        : "Frontal";

                infoResolucao.textContent =
                    `${video.videoWidth} × ${video.videoHeight}`;

                infoRostos.textContent = "0";
                infoObjetos.textContent = "0";

                botaoIniciar.disabled = true;
                botaoTrocar.disabled = false;
                botaoModo.disabled = false;
                botaoDetectar.disabled = false;
                botaoParar.disabled = false;

                configurarFlash();

                ultimoTempoVideo = -1;
                ultimaAnalise = 0;

                ultimosRostos = [];
                ultimosObjetos = [];

                statusTexto.textContent =
                    "Câmera ativa. Analisando a imagem...";

                executarLoop();

            } catch (erro) {

                console.error(
                    "Erro ao abrir câmera:",
                    erro
                );

                statusTexto.textContent =
                    "Não foi possível abrir a câmera.";

                botaoIniciar.disabled = false;

            }
        }


        /*
         * ESPELHAMENTO CORRETO
         */

        function configurarEspelhamento() {

            const frontal =
                cameraSelecionada === "user";

            /*
             * Apenas o vídeo é espelhado.
             */
            video.classList.toggle(
                "espelhado",
                frontal
            );

            /*
             * O canvas não é espelhado.
             * As coordenadas são corrigidas matematicamente.
             */
            canvas.classList.remove(
                "espelhado"
            );
        }


        /*
         * FLASH
         */

        function configurarFlash() {

            flashLigado = false;

            botaoFlash.textContent =
                "Ativar flash";

            if (
                cameraSelecionada !== "environment" ||
                !faixaVideo ||
                typeof faixaVideo.getCapabilities !== "function"
            ) {

                botaoFlash.disabled = true;

                botaoFlash.textContent =
                    cameraSelecionada === "user"
                        ? "Flash só na traseira"
                        : "Flash indisponível";

                return;
            }

            const capacidades =
                faixaVideo.getCapabilities();

            if (capacidades.torch === true) {

                botaoFlash.disabled = false;

            } else {

                botaoFlash.disabled = true;

                botaoFlash.textContent =
                    "Flash indisponível";
            }
        }


        async function alternarFlash() {

            if (!faixaVideo) {
                return;
            }

            try {

                const novoEstado =
                    !flashLigado;

                await faixaVideo.applyConstraints({
                    advanced: [
                        {
                            torch: novoEstado
                        }
                    ]
                });

                flashLigado =
                    novoEstado;

                botaoFlash.textContent =
                    flashLigado
                        ? "Desativar flash"
                        : "Ativar flash";

                statusTexto.textContent =
                    flashLigado
                        ? "Flash ligado."
                        : "Flash desligado.";

            } catch (erro) {

                console.error(
                    "Erro ao controlar flash:",
                    erro
                );

                flashLigado = false;

                botaoFlash.textContent =
                    "Ativar flash";

                statusTexto.textContent =
                    "Não foi possível controlar o flash.";
            }
        }


        /*
         * LOOP PRINCIPAL
         */

        function executarLoop(
            tempoAtual = performance.now()
        ) {

            if (
                !stream ||
                video.readyState < 2
            ) {

                animacaoId =
                    requestAnimationFrame(
                        executarLoop
                    );

                return;
            }

            if (
                deteccaoAtiva &&
                video.currentTime !== ultimoTempoVideo &&
                tempoAtual - ultimaAnalise >= INTERVALO_ANALISE_MS
            ) {

                executarDeteccoes(
                    tempoAtual
                );

                ultimoTempoVideo =
                    video.currentTime;

                ultimaAnalise =
                    tempoAtual;
            }

            desenharResultados();

            animacaoId =
                requestAnimationFrame(
                    executarLoop
                );
        }


        /*
         * EXECUÇÃO DOS MODELOS
         */

        function executarDeteccoes(
            tempoAtual
        ) {

            try {

                if (
                    modoDeteccao === "ambos" ||
                    modoDeteccao === "rosto"
                ) {

                    const resultadoRostos =
                        detectorFacial.detectForVideo(
                            video,
                            tempoAtual
                        );

                    ultimosRostos =
                        resultadoRostos.detections || [];

                } else {

                    ultimosRostos = [];
                }


                if (
                    modoDeteccao === "ambos" ||
                    modoDeteccao === "objetos"
                ) {

                    const resultadoObjetos =
                        detectorObjetos.detectForVideo(
                            video,
                            tempoAtual
                        );

                    ultimosObjetos =
                        resultadoObjetos.detections || [];

                } else {

                    ultimosObjetos = [];
                }


                infoRostos.textContent =
                    String(ultimosRostos.length);

                infoObjetos.textContent =
                    String(ultimosObjetos.length);


                const total =
                    ultimosRostos.length +
                    ultimosObjetos.length;

                if (total === 0) {

                    statusTexto.textContent =
                        "Nenhum rosto ou objeto conhecido detectado.";

                } else {

                    statusTexto.textContent =
                        `${ultimosRostos.length} rosto(s) e ` +
                        `${ultimosObjetos.length} objeto(s) detectado(s).`;
                }

            } catch (erro) {

                console.error(
                    "Erro durante a detecção:",
                    erro
                );

                statusTexto.textContent =
                    `Erro de detecção: ${erro.message}`;
            }
        }


        /*
         * DESENHO DOS RESULTADOS
         */

        function desenharResultados() {

            limparCanvas();

            if (!deteccaoAtiva) {

                desenharMensagemCentral(
                    "Detecção pausada"
                );

                return;
            }

            if (
                ultimosRostos.length === 0 &&
                ultimosObjetos.length === 0
            ) {

                desenharMensagemCentral(
                    "Procurando..."
                );
            }


            for (
                const rosto of ultimosRostos
            ) {

                desenharRosto(rosto);
            }


            for (
                const objeto of ultimosObjetos
            ) {

                desenharObjeto(objeto);
            }
        }


        /*
         * CORREÇÃO DAS COORDENADAS ESPELHADAS
         */

        function corrigirXCaixa(
            x,
            largura
        ) {

            if (
                cameraSelecionada === "user"
            ) {

                return (
                    canvas.width -
                    x -
                    largura
                );
            }

            return x;
        }


        function corrigirXPonto(
            xNormalizado
        ) {

            if (
                cameraSelecionada === "user"
            ) {

                return (
                    1 - xNormalizado
                ) * canvas.width;
            }

            return (
                xNormalizado *
                canvas.width
            );
        }


        /*
         * ROSTOS
         */

        function desenharRosto(
            deteccao
        ) {

            const caixa =
                deteccao.boundingBox;

            if (!caixa) {
                return;
            }

            const confianca =
                deteccao.categories?.[0]?.score || 0;

            const x =
                corrigirXCaixa(
                    caixa.originX,
                    caixa.width
                );

            const y =
                caixa.originY;


            contexto.strokeStyle =
                "#35ff72";

            contexto.lineWidth = 5;

            contexto.strokeRect(
                x,
                y,
                caixa.width,
                caixa.height
            );


            desenharEtiqueta(
                x,
                y,
                `Rosto ${(confianca * 100).toFixed(1)}%`,
                "#35ff72"
            );


            for (
                const ponto of deteccao.keypoints || []
            ) {

                const pontoX =
                    corrigirXPonto(
                        ponto.x
                    );

                const pontoY =
                    ponto.y * canvas.height;

                contexto.beginPath();

                contexto.arc(
                    pontoX,
                    pontoY,
                    7,
                    0,
                    Math.PI * 2
                );

                contexto.fillStyle =
                    "#ffe600";

                contexto.fill();

                contexto.strokeStyle =
                    "#111111";

                contexto.lineWidth = 2;

                contexto.stroke();
            }
        }


        /*
         * OBJETOS
         */

        function desenharObjeto(
            deteccao
        ) {

            const caixa =
                deteccao.boundingBox;

            if (!caixa) {
                return;
            }

            const categoria =
                deteccao.categories?.[0];

            if (!categoria) {
                return;
            }

            const nomeOriginal =
                categoria.categoryName ||
                categoria.displayName ||
                "objeto";

            const nomeTraduzido =
                traducoes[nomeOriginal] ||
                nomeOriginal;

            const confianca =
                categoria.score || 0;

            const x =
                corrigirXCaixa(
                    caixa.originX,
                    caixa.width
                );

            const y =
                caixa.originY;


            contexto.strokeStyle =
                "#00c8ff";

            contexto.lineWidth = 5;

            contexto.strokeRect(
                x,
                y,
                caixa.width,
                caixa.height
            );


            desenharEtiqueta(
                x,
                y,
                `${nomeTraduzido} ${(confianca * 100).toFixed(1)}%`,
                "#00c8ff"
            );
        }


        /*
         * ETIQUETAS
         */

        function desenharEtiqueta(
            x,
            y,
            texto,
            cor
        ) {

            contexto.font =
                "bold 25px Arial";

            const larguraTexto =
                contexto.measureText(
                    texto
                ).width;

            const alturaEtiqueta = 39;

            let etiquetaX = x;

            /*
             * Impede a etiqueta de sair pela direita.
             */
            if (
                etiquetaX +
                larguraTexto +
                20 >
                canvas.width
            ) {

                etiquetaX =
                    canvas.width -
                    larguraTexto -
                    20;
            }

            etiquetaX =
                Math.max(
                    0,
                    etiquetaX
                );

            const etiquetaY =
                Math.max(
                    alturaEtiqueta,
                    y
                );


            contexto.fillStyle =
                "rgba(0, 0, 0, 0.78)";

            contexto.fillRect(
                etiquetaX,
                etiquetaY - alturaEtiqueta,
                larguraTexto + 18,
                alturaEtiqueta
            );


            contexto.fillStyle = cor;

            contexto.fillText(
                texto,
                etiquetaX + 8,
                etiquetaY - 10
            );
        }


        function desenharMensagemCentral(
            texto
        ) {

            contexto.font =
                "bold 23px Arial";

            const larguraTexto =
                contexto.measureText(
                    texto
                ).width;

            const x =
                Math.max(
                    12,
                    (
                        canvas.width -
                        larguraTexto
                    ) / 2
                );

            contexto.fillStyle =
                "rgba(0, 0, 0, 0.65)";

            contexto.fillRect(
                x - 12,
                15,
                larguraTexto + 24,
                46
            );

            contexto.fillStyle =
                "white";

            contexto.fillText(
                texto,
                x,
                47
            );
        }


        function limparCanvas() {

            contexto.clearRect(
                0,
                0,
                canvas.width,
                canvas.height
            );
        }


        /*
         * CONTROLES
         */

        function alternarModo() {

            if (
                modoDeteccao === "ambos"
            ) {

                modoDeteccao = "rosto";

            } else if (
                modoDeteccao === "rosto"
            ) {

                modoDeteccao = "objetos";

            } else {

                modoDeteccao = "ambos";
            }


            if (
                modoDeteccao === "ambos"
            ) {

                botaoModo.textContent =
                    "Modo: ambos";

            } else if (
                modoDeteccao === "rosto"
            ) {

                botaoModo.textContent =
                    "Modo: rosto";

            } else {

                botaoModo.textContent =
                    "Modo: objetos";
            }


            ultimosRostos = [];
            ultimosObjetos = [];

            infoRostos.textContent = "0";
            infoObjetos.textContent = "0";

            statusTexto.textContent =
                `Modo alterado para: ${modoDeteccao}.`;
        }


        function alternarDeteccao() {

            deteccaoAtiva =
                !deteccaoAtiva;

            botaoDetectar.textContent =
                deteccaoAtiva
                    ? "Detecção: ON"
                    : "Detecção: OFF";

            if (!deteccaoAtiva) {

                ultimosRostos = [];
                ultimosObjetos = [];

                infoRostos.textContent = "0";
                infoObjetos.textContent = "0";

                statusTexto.textContent =
                    "Detecção pausada.";

            } else {

                statusTexto.textContent =
                    "Detecção ativada.";
            }
        }


        async function trocarCamera() {

            cameraSelecionada =
                cameraSelecionada === "environment"
                    ? "user"
                    : "environment";

            await iniciarCamera();
        }


        function pararCamera(
            atualizarStatus = true
        ) {

            if (
                animacaoId !== null
            ) {

                cancelAnimationFrame(
                    animacaoId
                );

                animacaoId = null;
            }


            if (
                stream !== null
            ) {

                stream
                    .getTracks()
                    .forEach(
                        track => track.stop()
                    );
            }


            stream = null;
            faixaVideo = null;

            flashLigado = false;

            video.srcObject = null;

            video.classList.remove(
                "espelhado"
            );

            ultimosRostos = [];
            ultimosObjetos = [];

            limparCanvas();

            infoCamera.textContent =
                "Desligada";

            infoResolucao.textContent =
                "—";

            infoRostos.textContent =
                "0";

            infoObjetos.textContent =
                "0";


            botaoIniciar.disabled =
                detectorFacial === null ||
                detectorObjetos === null;

            botaoTrocar.disabled = true;
            botaoFlash.disabled = true;
            botaoModo.disabled = true;
            botaoDetectar.disabled = true;
            botaoParar.disabled = true;

            botaoFlash.textContent =
                "Ativar flash";


            if (atualizarStatus) {

                statusTexto.textContent =
                    "Câmera desligada.";
            }
        }


        /*
         * EVENTOS
         */

        botaoIniciar.addEventListener(
            "click",
            iniciarCamera
        );

        botaoTrocar.addEventListener(
            "click",
            trocarCamera
        );

        botaoFlash.addEventListener(
            "click",
            alternarFlash
        );

        botaoModo.addEventListener(
            "click",
            alternarModo
        );

        botaoDetectar.addEventListener(
            "click",
            alternarDeteccao
        );

        botaoParar.addEventListener(
            "click",
            () => pararCamera(true)
        );


        /*
         * INICIALIZAÇÃO
         */

        carregarModelos();

    </script>

</body>
</html>
