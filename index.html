<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <meta
        http-equiv="Cache-Control"
        content="no-cache, no-store, must-revalidate"
    >

    <title>AI-Lab Mobile V3</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding:
                max(16px, env(safe-area-inset-top))
                14px
                max(28px, env(safe-area-inset-bottom));

            background: #101114;
            color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .app {
            width: min(100%, 850px);
            margin: 0 auto;
        }

        .cabecalho {
            text-align: center;
            margin-bottom: 12px;
        }

        h1 {
            margin: 4px 0;
            font-size: 26px;
        }

        .versao {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background: #29303b;
            color: #76c8ff;
            font-size: 12px;
            font-weight: bold;
        }

        #status {
            min-height: 44px;
            margin: 12px 0;
            color: #d8d8d8;
            font-size: 15px;
            line-height: 1.4;
            text-align: center;
        }

        .camera-box {
            position: relative;
            width: 100%;
            overflow: hidden;
            border: 2px solid #454950;
            border-radius: 16px;
            background: #000000;
        }

        video {
            display: block;
            width: 100%;
            height: auto;
            background: #000000;
        }

        canvas {
            position: absolute;
            inset: 0;
            display: block;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /*
         * Espelha vídeo e desenhos simultaneamente.
         * Usado apenas na câmera frontal.
         */
        .espelhado {
            transform: scaleX(-1);
        }

        .informacoes {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-top: 12px;
        }

        .cartao {
            padding: 11px 8px;
            border: 1px solid #32363e;
            border-radius: 11px;
            background: #191c21;
            text-align: center;
        }

        .cartao strong {
            display: block;
            margin-bottom: 5px;
            color: #8ae99f;
            font-size: 12px;
        }

        .cartao span {
            font-size: 16px;
            font-weight: bold;
        }

        .botoes {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        button {
            min-width: 138px;
            padding: 13px 15px;
            border: none;
            border-radius: 10px;
            color: #101114;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #iniciar {
            background: #39cc72;
        }

        #trocar {
            background: #f0b744;
        }

        #flash {
            background: #8b73ff;
            color: white;
        }

        #detectar {
            background: #49a5ff;
            color: white;
        }

        #parar {
            background: #eb6262;
            color: white;
        }

        .rodape {
            margin-top: 14px;
            color: #aeb3bc;
            font-size: 13px;
            line-height: 1.45;
            text-align: center;
        }

        @media (min-width: 700px) {
            .informacoes {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body>
    <main class="app">

        <header class="cabecalho">
            <h1>AI-Lab Mobile</h1>
            <span class="versao">VERSÃO 3 — DETECÇÃO FACIAL</span>
        </header>

        <p id="status">
            Preparando o sistema de visão computacional...
        </p>

        <div class="camera-box">
            <video
                id="video"
                autoplay
                muted
                playsinline
            ></video>

            <canvas id="overlay"></canvas>
        </div>

        <section class="informacoes">

            <div class="cartao">
                <strong>CÂMERA</strong>
                <span id="infoCamera">Desligada</span>
            </div>

            <div class="cartao">
                <strong>RESOLUÇÃO</strong>
                <span id="infoResolucao">—</span>
            </div>

            <div class="cartao">
                <strong>ROSTOS</strong>
                <span id="infoRostos">0</span>
            </div>

            <div class="cartao">
                <strong>CONFIANÇA</strong>
                <span id="infoConfianca">—</span>
            </div>

        </section>

        <div class="botoes">

            <button id="iniciar" disabled>
                Iniciar câmera
            </button>

            <button id="trocar" disabled>
                Trocar câmera
            </button>

            <button id="flash" disabled>
                Ativar flash
            </button>

            <button id="detectar" disabled>
                Detecção: ON
            </button>

            <button id="parar" disabled>
                Parar
            </button>

        </div>

        <p class="rodape">
            O retângulo verde indica o rosto detectado.
            Os pontos amarelos representam referências faciais.
        </p>

    </main>

    <script type="module">

        import {
            FaceDetector,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs";

        const video =
            document.getElementById("video");

        const canvas =
            document.getElementById("overlay");

        const contexto =
            canvas.getContext("2d");

        const statusTexto =
            document.getElementById("status");

        const infoCamera =
            document.getElementById("infoCamera");

        const infoResolucao =
            document.getElementById("infoResolucao");

        const infoRostos =
            document.getElementById("infoRostos");

        const infoConfianca =
            document.getElementById("infoConfianca");

        const botaoIniciar =
            document.getElementById("iniciar");

        const botaoTrocar =
            document.getElementById("trocar");

        const botaoFlash =
            document.getElementById("flash");

        const botaoDetectar =
            document.getElementById("detectar");

        const botaoParar =
            document.getElementById("parar");

        let detectorFacial = null;

        let stream = null;
        let faixaVideo = null;

        let cameraSelecionada = "environment";

        let flashLigado = false;
        let deteccaoAtiva = true;

        let animacaoId = null;
        let ultimoTempoVideo = -1;
        let ultimaAnalise = 0;

        const INTERVALO_ANALISE = 80;

        async function carregarDetector() {

            try {

                statusTexto.textContent =
                    "Baixando biblioteca de visão computacional...";

                const arquivosVision =
                    await FilesetResolver.forVisionTasks(
                        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
                    );

                statusTexto.textContent =
                    "Baixando modelo de detecção facial...";

                detectorFacial =
                    await FaceDetector.createFromOptions(
                        arquivosVision,
                        {
                            baseOptions: {
                                modelAssetPath:
                                    "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite"
                            },

                            runningMode: "VIDEO",

                            minDetectionConfidence: 0.45,

                            minSuppressionThreshold: 0.3
                        }
                    );

                statusTexto.textContent =
                    "Detector facial carregado. Pressione “Iniciar câmera”.";

                botaoIniciar.disabled = false;

            } catch (erro) {

                console.error(
                    "Erro ao carregar MediaPipe:",
                    erro
                );

                statusTexto.textContent =
                    "Falha ao carregar o detector facial. Recarregue a página.";

            }
        }

        async function iniciarCamera() {

            pararCamera(false);

            statusTexto.textContent =
                "Solicitando acesso à câmera...";

            const configuracao = {
                audio: false,

                video: {
                    facingMode: {
                        ideal: cameraSelecionada
                    },

                    width: {
                        ideal: 1280
                    },

                    height: {
                        ideal: 720
                    }
                }
            };

            try {

                stream =
                    await navigator.mediaDevices.getUserMedia(
                        configuracao
                    );

                faixaVideo =
                    stream.getVideoTracks()[0];

                video.srcObject = stream;

                await video.play();

                canvas.width =
                    video.videoWidth;

                canvas.height =
                    video.videoHeight;

                configurarEspelhamento();

                infoCamera.textContent =
                    cameraSelecionada === "environment"
                        ? "Traseira"
                        : "Frontal";

                infoResolucao.textContent =
                    `${video.videoWidth} × ${video.videoHeight}`;

                infoRostos.textContent = "0";
                infoConfianca.textContent = "—";

                botaoIniciar.disabled = true;
                botaoTrocar.disabled = false;
                botaoDetectar.disabled = false;
                botaoParar.disabled = false;

                configurarFlash();

                statusTexto.textContent =
                    deteccaoAtiva
                        ? "Câmera ativa. Procurando rostos..."
                        : "Câmera ativa. Detecção pausada.";

                ultimoTempoVideo = -1;
                ultimaAnalise = 0;

                executarAnalise();

            } catch (erro) {

                console.error(
                    "Erro ao abrir câmera:",
                    erro
                );

                statusTexto.textContent =
                    "Não foi possível abrir a câmera. Verifique a permissão do Safari.";

                botaoIniciar.disabled = false;

            }
        }

        function configurarEspelhamento() {

            const usarEspelho =
                cameraSelecionada === "user";

            video.classList.toggle(
                "espelhado",
                usarEspelho
            );

            canvas.classList.toggle(
                "espelhado",
                usarEspelho
            );
        }

        function configurarFlash() {

            flashLigado = false;

            botaoFlash.textContent =
                "Ativar flash";

            if (
                cameraSelecionada !== "environment" ||
                !faixaVideo ||
                typeof faixaVideo.getCapabilities !== "function"
            ) {

                botaoFlash.disabled = true;

                botaoFlash.textContent =
                    cameraSelecionada === "user"
                        ? "Flash só na traseira"
                        : "Flash indisponível";

                return;
            }

            const capacidades =
                faixaVideo.getCapabilities();

            if (
                capacidades.torch === true
            ) {

                botaoFlash.disabled = false;

            } else {

                botaoFlash.disabled = true;

                botaoFlash.textContent =
                    "Flash indisponível";
            }
        }

        async function alternarFlash() {

            if (!faixaVideo) {
                return;
            }

            try {

                const novoEstado =
                    !flashLigado;

                await faixaVideo.applyConstraints({
                    advanced: [
                        {
                            torch: novoEstado
                        }
                    ]
                });

                flashLigado =
                    novoEstado;

                botaoFlash.textContent =
                    flashLigado
                        ? "Desativar flash"
                        : "Ativar flash";

                statusTexto.textContent =
                    flashLigado
                        ? "Flash ligado."
                        : "Flash desligado.";

            } catch (erro) {

                console.error(
                    "Erro no flash:",
                    erro
                );

                flashLigado = false;

                botaoFlash.textContent =
                    "Ativar flash";

                statusTexto.textContent =
                    "Não foi possível controlar o flash.";

            }
        }

        function executarAnalise(
            tempoAtual = performance.now()
        ) {

            if (
                !stream ||
                video.readyState < 2
            ) {

                animacaoId =
                    requestAnimationFrame(
                        executarAnalise
                    );

                return;
            }

            limparCanvas();

            if (
                deteccaoAtiva &&
                detectorFacial &&
                video.currentTime !== ultimoTempoVideo &&
                tempoAtual - ultimaAnalise >= INTERVALO_ANALISE
            ) {

                try {

                    const resultado =
                        detectorFacial.detectForVideo(
                            video,
                            tempoAtual
                        );

                    desenharResultado(
                        resultado.detections || []
                    );

                    ultimoTempoVideo =
                        video.currentTime;

                    ultimaAnalise =
                        tempoAtual;

                } catch (erro) {

                    console.error(
                        "Erro na detecção:",
                        erro
                    );

                    statusTexto.textContent =
                        `Erro durante a detecção: ${erro.message}`;

                }

            } else if (!deteccaoAtiva) {

                desenharMensagem(
                    "Detecção pausada"
                );
            }

            animacaoId =
                requestAnimationFrame(
                    executarAnalise
                );
        }

        function desenharResultado(
            deteccoes
        ) {

            infoRostos.textContent =
                String(deteccoes.length);

            if (deteccoes.length === 0) {

                infoConfianca.textContent = "—";

                desenharMensagem(
                    "Nenhum rosto detectado"
                );

                return;
            }

            let maiorConfianca = 0;

            for (
                const deteccao of deteccoes
            ) {

                const confianca =
                    deteccao.categories?.[0]?.score || 0;

                maiorConfianca =
                    Math.max(
                        maiorConfianca,
                        confianca
                    );

                desenharCaixa(
                    deteccao.boundingBox,
                    confianca
                );

                desenharPontos(
                    deteccao.keypoints || []
                );
            }

            infoConfianca.textContent =
                `${(maiorConfianca * 100).toFixed(1)}%`;

            statusTexto.textContent =
                deteccoes.length === 1
                    ? "1 rosto detectado."
                    : `${deteccoes.length} rostos detectados.`;
        }

        function desenharCaixa(
            caixa,
            confianca
        ) {

            if (!caixa) {
                return;
            }

            contexto.strokeStyle =
                "#35ff72";

            contexto.lineWidth = 5;

            contexto.strokeRect(
                caixa.originX,
                caixa.originY,
                caixa.width,
                caixa.height
            );

            const texto =
                `Rosto ${(confianca * 100).toFixed(1)}%`;

            contexto.font =
                "bold 25px Arial";

            const larguraTexto =
                contexto.measureText(texto).width;

            const alturaEtiqueta = 38;

            const posicaoY =
                Math.max(
                    alturaEtiqueta,
                    caixa.originY
                );

            contexto.fillStyle =
                "rgba(0, 0, 0, 0.72)";

            contexto.fillRect(
                caixa.originX,
                posicaoY - alturaEtiqueta,
                larguraTexto + 18,
                alturaEtiqueta
            );

            contexto.fillStyle =
                "#35ff72";

            contexto.fillText(
                texto,
                caixa.originX + 8,
                posicaoY - 10
            );
        }

        function desenharPontos(
            pontos
        ) {

            for (
                const ponto of pontos
            ) {

                const x =
                    ponto.x * canvas.width;

                const y =
                    ponto.y * canvas.height;

                contexto.beginPath();

                contexto.arc(
                    x,
                    y,
                    7,
                    0,
                    Math.PI * 2
                );

                contexto.fillStyle =
                    "#ffe600";

                contexto.fill();

                contexto.strokeStyle =
                    "#111111";

                contexto.lineWidth = 2;

                contexto.stroke();
            }
        }

        function desenharMensagem(
            texto
        ) {

            contexto.font =
                "bold 23px Arial";

            const larguraTexto =
                contexto.measureText(texto).width;

            const x =
                Math.max(
                    12,
                    (canvas.width - larguraTexto) / 2
                );

            contexto.fillStyle =
                "rgba(0, 0, 0, 0.65)";

            contexto.fillRect(
                x - 12,
                15,
                larguraTexto + 24,
                46
            );

            contexto.fillStyle =
                "#ffffff";

            contexto.fillText(
                texto,
                x,
                47
            );
        }

        function limparCanvas() {

            contexto.clearRect(
                0,
                0,
                canvas.width,
                canvas.height
            );
        }

        function alternarDeteccao() {

            deteccaoAtiva =
                !deteccaoAtiva;

            botaoDetectar.textContent =
                deteccaoAtiva
                    ? "Detecção: ON"
                    : "Detecção: OFF";

            if (!deteccaoAtiva) {

                infoRostos.textContent = "0";

                infoConfianca.textContent = "—";

                statusTexto.textContent =
                    "Detecção facial pausada.";

            } else {

                statusTexto.textContent =
                    "Detecção facial ativada.";
            }
        }

        async function trocarCamera() {

            cameraSelecionada =
                cameraSelecionada === "environment"
                    ? "user"
                    : "environment";

            await iniciarCamera();
        }

        function pararCamera(
            atualizarStatus = true
        ) {

            if (animacaoId !== null) {

                cancelAnimationFrame(
                    animacaoId
                );

                animacaoId = null;
            }

            if (stream !== null) {

                stream
                    .getTracks()
                    .forEach(
                        track => track.stop()
                    );
            }

            stream = null;
            faixaVideo = null;
            flashLigado = false;

            video.srcObject = null;

            video.classList.remove(
                "espelhado"
            );

            canvas.classList.remove(
                "espelhado"
            );

            limparCanvas();

            infoCamera.textContent =
                "Desligada";

            infoResolucao.textContent =
                "—";

            infoRostos.textContent =
                "0";

            infoConfianca.textContent =
                "—";

            botaoIniciar.disabled =
                detectorFacial === null;

            botaoTrocar.disabled = true;
            botaoFlash.disabled = true;
            botaoDetectar.disabled = true;
            botaoParar.disabled = true;

            botaoFlash.textContent =
                "Ativar flash";

            if (atualizarStatus) {

                statusTexto.textContent =
                    "Câmera desligada.";
            }
        }

        botaoIniciar.addEventListener(
            "click",
            iniciarCamera
        );

        botaoTrocar.addEventListener(
            "click",
            trocarCamera
        );

        botaoFlash.addEventListener(
            "click",
            alternarFlash
        );

        botaoDetectar.addEventListener(
            "click",
            alternarDeteccao
        );

        botaoParar.addEventListener(
            "click",
            () => pararCamera(true)
        );

        carregarDetector();

    </script>
</body>
</html>
